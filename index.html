<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Weather</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛅</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛅</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-seed: #4285f4;
            --surface: #f8f9ff;
            --on-surface: #1a1c1e;
            --primary-container: rgba(66, 133, 244, 0.15);
            --on-primary-container: #00154e;
            --secondary-container: #e1e2ec;
            --surface-variant: #e1e2ec;
            --transition: all 0.25s cubic-bezier(0, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --surface: #1a1c1e;
            --on-surface: #e2e2e6;
            --on-primary-container: #dce1ff;
            --secondary-container: #2f3033;
            --surface-variant: #44474f;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            margin: 0;
            padding: 20px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; position: relative; }

        .header {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 12px;
        }

        #current-city { 
            font-size: clamp(0.85rem, 3.8vw, 1.1rem);
            font-weight: 500; 
            margin: 0; 
            flex: 1; 
            line-height: 1.25;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: var(--transition);
        }

        .menu-container { position: relative; flex-shrink: 0; }

        button.icon-btn {
            border: none; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; background: var(--secondary-container);
            font-size: 18px; display: flex; align-items: center;
            justify-content: center; transition: var(--transition);
            color: var(--on-surface);
        }

        /* ОБЩИЕ СТИЛИ МЕНЮ */
        .dropdown-menu {
            position: absolute; top: 50px; right: 0;
            background: var(--surface-variant);
            border-radius: 24px;
            padding: 8px;
            min-width: 220px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
            z-index: 500;
            display: none;
            flex-direction: column;
            transform-origin: top right;
            animation: slideDown 0.2s cubic-bezier(0, 0, 0.2, 1);
        }
        .dropdown-menu.active { display: flex; }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 18px;
            transition: background 0.2s ease;
            font-weight: 500;
            font-size: 15px;
        }
        .menu-item:hover { background: rgba(128,128,128,0.2); }
        .menu-item .icon { font-size: 20px; width: 24px; text-align: center; }

        /* СПЕЦИФИКА ПАЛИТРЫ */
        .palette-header {
            border-bottom: 1px solid rgba(128,128,128,0.1);
            margin-bottom: 8px;
            padding-bottom: 4px;
        }

        .colors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 8px;
        }

        .color-dot { 
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; 
            transition: transform 0.15s ease;
        }
        .color-dot:hover { transform: scale(1.1); }
        .custom-color-wrapper { width: 36px; height: 36px; border-radius: 50%; background: conic-gradient(from 0deg, red, #ff0, lime, aqua, blue, #f0f, red); position: relative; overflow: hidden; }
        #custom-color-btn { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; opacity: 0; }

        /* ПОИСК */
        .search-wrapper {
            position: relative; width: 100%; display: none; flex-direction: column;
            animation: slideDown 0.2s ease;
        }
        .search-wrapper.active { display: flex; }
        .search-container { display: flex; width: 100%; gap: 8px; align-items: center; }
        .search-input {
            flex: 1; border: none; background: var(--secondary-container);
            color: var(--on-surface); padding: 12px 20px;
            border-radius: 24px; outline: none; font-family: inherit;
            transition: var(--transition);
        }

        .suggestions-list {
            position: absolute; top: 52px; left: 0; right: 0;
            background: var(--surface-variant); border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 150; max-height: 300px; overflow-y: auto; display: none;
        }
        .suggestions-list.active { display: block; }

        .suggestion-item {
            padding: 14px 20px; cursor: pointer; font-size: 14px;
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        /* КАРТОЧКА */
        .weather-card {
            background: var(--primary-container); color: var(--on-primary-container);
            padding: 40px 32px; border-radius: 32px; text-align: center;
            margin-bottom: 24px; transition: var(--transition);
        }
        .temp { font-size: 88px; font-weight: 700; margin: 5px 0; letter-spacing: -4px; transition: var(--transition); }
        .source-select {
            background: rgba(128,128,128,0.15); border: 1px solid rgba(0,0,0,0.05);
            padding: 10px 20px; border-radius: 16px; color: inherit;
            font-family: inherit; margin-bottom: 20px; cursor: pointer;
            outline: none; transition: var(--transition);
        }

        .forecast-item {
            background: var(--secondary-container); padding: 18px 24px;
            border-radius: 24px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px; transition: var(--transition);
        }
        .forecast-info { display: flex; align-items: center; gap: 15px; }
        .forecast-icon { font-size: 24px; }
        .forecast-date { font-weight: 500; min-width: 60px; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        h3 { margin-left: 12px; font-weight: 500; transition: var(--transition); }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div class="header">
        <div class="top-bar">
            <h2 id="current-city">Определение...</h2>
            <div class="menu-container">
                <button class="icon-btn" onclick="toggleMenu(event)" title="Меню">☰</button>
                
                <div class="dropdown-menu" id="main-menu">
                    <div class="menu-item" onclick="handleMenuAction('location')">
                        <span class="icon">🎯</span> Мое местоположение
                    </div>
                    <div class="menu-item" onclick="handleMenuAction('search')">
                        <span class="icon">📍</span> Ввести адрес
                    </div>
                    <div class="menu-item" onclick="handleMenuAction('palette')">
                        <span class="icon">🎨</span> Цвет
                    </div>
                    <div class="menu-item" onclick="handleMenuAction('theme')">
                        <span class="icon" id="menu-theme-icon">☀️</span> Тема
                    </div>
                </div>

                <div class="dropdown-menu" id="palette">
                    <div class="palette-header">
                        <div class="menu-item" onclick="backToMenu()">
                            <span class="icon">←</span> Назад
                        </div>
                    </div>
                    <div class="colors-grid">
                        <div class="color-dot" style="background: #FF0000" onclick="setAccent('#FF0000')"></div>
                        <div class="color-dot" style="background: #D4FF00" onclick="setAccent('#D4FF00')"></div>
                        <div class="color-dot" style="background: #FF7B00" onclick="setAccent('#FF7B00')"></div>
                        <div class="color-dot" style="background: #FFDD00" onclick="setAccent('#FFDD00')"></div>
                        <div class="color-dot" style="background: #11FF00" onclick="setAccent('#11FF00')"></div>
                        <div class="color-dot" style="background: #00FFEE" onclick="setAccent('#00FFEE')"></div>
                        <div class="color-dot" style="background: #001EFF" onclick="setAccent('#001EFF')"></div>
                        <div class="color-dot" style="background: #AE00FF" onclick="setAccent('#AE00FF')"></div>
                        <div class="color-dot" style="background: #FF004C" onclick="setAccent('#FF004C')"></div>
                        <div class="color-dot" style="background: #000000" onclick="setAccent('#000000')"></div>
                        <div class="color-dot" style="background: #FFFFFF" onclick="setAccent('#FFFFFF')"></div>
                        <div class="custom-color-wrapper">
                            <input type="color" id="custom-color-btn" oninput="setAccent(this.value)">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="search-wrapper" id="search-wrapper">
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Город, район или улица..." oninput="onSearchInput(this.value)" onkeypress="handleSearch(event)">
                <button class="icon-btn" onclick="performSearch()">🔍</button>
            </div>
            <div class="suggestions-list" id="suggestions"></div>
        </div>
    </div>

    <div class="weather-card">
        <select class="source-select" id="source" onchange="saveAndFetch()">
            <option value="openmeteo">Open-Meteo</option>
            <option value="yandex">Яндекс Погода</option>
            <option value="accuweather">AccuWeather</option>
        </select>
        <div class="temp" id="current-temp">--°</div>
        <div id="weather-desc" style="font-weight: 500; margin-bottom: 8px; font-size: 20px;">Загрузка...</div>
        <div style="font-size: 13px; opacity: 0.5" id="coords-display"></div>
    </div>

    <h3>Прогноз на 10 дней</h3>
    <div id="forecast"></div>
</div>

<script>
    const KEYS = {
        yandex: '33cd5edb-414a-452f-9e7e-0dd0e851f159',
        accu: 'zpka_037982925b6d47d082834529273794bf_302056d7'
    };

    let userCoords = { lat: 0, lon: 0 };
    let searchTimer;
    const capitalize = (s) => s && s[0].toUpperCase() + s.slice(1);

    // --- УПРАВЛЕНИЕ МЕНЮ ---
    function toggleMenu(e) {
        e.stopPropagation();
        const mainMenu = document.getElementById('main-menu');
        const palette = document.getElementById('palette');
        
        // Если открыта палитра, при клике на ☰ просто закрываем всё
        if (palette.classList.contains('active')) {
            palette.classList.remove('active');
        } else {
            mainMenu.classList.toggle('active');
        }
    }

    function backToMenu() {
        document.getElementById('palette').classList.remove('active');
        document.getElementById('main-menu').classList.add('active');
    }

    function handleMenuAction(action) {
        if (action === 'location') {
            getLocation();
            document.getElementById('main-menu').classList.remove('active');
        } else if (action === 'search') {
            const wrapper = document.getElementById('search-wrapper');
            wrapper.classList.toggle('active');
            if(wrapper.classList.contains('active')) document.getElementById('search-input').focus();
            document.getElementById('main-menu').classList.remove('active');
        } else if (action === 'palette') {
            document.getElementById('main-menu').classList.remove('active');
            document.getElementById('palette').classList.add('active');
        } else if (action === 'theme') {
            toggleTheme();
            // Меню НЕ закрываем, как просил пользователь
        }
    }

    window.onclick = (e) => {
        if (!e.target.closest('.menu-container')) {
            document.getElementById('main-menu').classList.remove('active');
            document.getElementById('palette').classList.remove('active');
        }
        if (document.getElementById('search-wrapper') && !document.getElementById('search-wrapper').contains(e.target)) {
            document.getElementById('suggestions').classList.remove('active');
        }
    };

    // --- ГЕОЛОКАЦИЯ И ПОИСК ---
    function formatAddress(addr) {
        if (!addr) return "Местоположение";
        let parts = [];
        const zone = addr.quarter || addr.suburb || addr.neighbourhood || addr.city_district || addr.place;
        const street = addr.road || addr.pedestrian;
        if (street) parts.push(street);
        if (zone && zone !== street) parts.push(zone);
        if (parts.length === 0) {
            const city = addr.city || addr.town || addr.village;
            if (city) parts.push(city);
        }
        if (addr.country) parts.push(addr.country);
        return parts.join(', ');
    }

    function onSearchInput(val) {
        clearTimeout(searchTimer);
        const list = document.getElementById('suggestions');
        const inputVal = val.trim();
        if(inputVal.length < 2) { list.classList.remove('active'); return; }
        
        searchTimer = setTimeout(async () => {
            try {
                const numberMatch = inputVal.match(/\d+/);
                const searchNum = numberMatch ? numberMatch[0] : null;
                let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(inputVal)}&limit=50&addressdetails=1&accept-language=ru`;
                if (userCoords.lat !== 0) {
                    const offset = 0.5;
                    const viewbox = `${userCoords.lon-offset},${userCoords.lat+offset},${userCoords.lon+offset},${userCoords.lat-offset}`;
                    url += `&viewbox=${viewbox}`;
                }
                const res = await fetch(url, { headers: { 'User-Agent': 'MaterialWeather/1.9' } });
                const data = await res.json();
                if(data && data.length > 0) {
                    const uniqueResults = new Map();
                    const filtered = data.filter(item => {
                        if (!searchNum) return true;
                        const name = item.display_name.toLowerCase();
                        const regex = new RegExp(`(^|\\D)${searchNum}(\\D|$)`);
                        return regex.test(name);
                    });
                    sorted = filtered.sort((a, b) => {
                        const keywords = ["микрорайон", "квартал", "мкр", "кв"];
                        const aMatch = keywords.some(k => a.display_name.toLowerCase().includes(k));
                        const bMatch = keywords.some(k => b.display_name.toLowerCase().includes(k));
                        return bMatch - aMatch;
                    });
                    sorted.forEach(item => {
                        const cleanName = formatAddress(item.address);
                        if (!uniqueResults.has(cleanName)) uniqueResults.set(cleanName, item);
                    });
                    const finalResults = Array.from(uniqueResults.values()).slice(0, 8);
                    if (finalResults.length > 0) {
                        list.innerHTML = finalResults.map(item => `
                            <div class="suggestion-item" onclick="selectSuggestion(${item.lat}, ${item.lon}, '${formatAddress(item.address).replace(/'/g, "\\'")}')">
                                ${formatAddress(item.address)}
                                <small style="display:block; opacity:0.6; margin-top:2px;">${item.address.city || item.address.state || ''}</small>
                            </div>
                        `).join('');
                        list.classList.add('active');
                    } else list.classList.remove('active');
                } else list.classList.remove('active');
            } catch(e) { console.error(e); }
        }, 400);
    }

    function selectSuggestion(lat, lon, name) {
        userCoords.lat = lat; userCoords.lon = lon;
        document.getElementById('current-city').innerText = name;
        document.getElementById('coords-display').innerText = `${lat.toFixed(4)}°N, ${lon.toFixed(4)}°E`;
        document.getElementById('suggestions').classList.remove('active');
        document.getElementById('search-wrapper').classList.remove('active');
        fetchWeather();
    }

    function handleSearch(e) { if(e.key === 'Enter') performSearch(); }

    async function performSearch() {
        const query = document.getElementById('search-input').value.trim();
        if(!query) return;
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&addressdetails=1&accept-language=ru`;
            const res = await fetch(url, { headers: { 'User-Agent': 'MaterialWeather/1.9' } });
            const data = await res.json();
            if(data.length > 0) selectSuggestion(parseFloat(data[0].lat), parseFloat(data[0].lon), formatAddress(data[0].address));
        } catch(e) { alert("Ошибка поиска"); }
    }

    function getLocation() {
        if (navigator.geolocation) {
            document.getElementById('current-city').innerText = "Определение...";
            navigator.geolocation.getCurrentPosition(async position => {
                userCoords.lat = position.coords.latitude;
                userCoords.lon = position.coords.longitude;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userCoords.lat}&lon=${userCoords.lon}&addressdetails=1&accept-language=ru`, {
                        headers: { 'User-Agent': 'MaterialWeather/1.9' }
                    });
                    const data = await res.json();
                    document.getElementById('current-city').innerText = formatAddress(data.address);
                } catch(e) { document.getElementById('current-city').innerText = "Мое место"; }
                document.getElementById('coords-display').innerText = `${userCoords.lat.toFixed(4)}°N, ${userCoords.lon.toFixed(4)}°E`;
                fetchWeather();
            }, () => alert("Разрешите доступ к GPS"), { enableHighAccuracy: true });
        }
    }

    // --- НАСТРОЙКИ ---
    function initSettings() {
        const savedTheme = localStorage.getItem('weather-theme') || 'light';
        const savedColor = localStorage.getItem('weather-accent') || '#4285f4';
        const savedSource = localStorage.getItem('weather-source') || 'openmeteo';
        document.body.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
        document.getElementById('source').value = savedSource;
        setAccent(savedColor, false);
    }

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', next);
        updateThemeIcon(next);
        localStorage.setItem('weather-theme', next);
        setAccent(localStorage.getItem('weather-accent') || '#4285f4', false);
    }

    function updateThemeIcon(theme) {
        const icon = theme === 'light' ? '☀️' : '🌙';
        document.getElementById('menu-theme-icon').innerText = icon;
    }

    function setAccent(color, save = true) {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.documentElement.style.setProperty('--primary-container', color + (isDark ? '40' : '26'));
        document.documentElement.style.setProperty('--primary-seed', color);
        if(save) localStorage.setItem('weather-accent', color);
    }

    function saveAndFetch() { localStorage.setItem('weather-source', document.getElementById('source').value); fetchWeather(); }

    window.onload = () => { initSettings(); getLocation(); };

    // --- ПОГОДА ---
    const wmoCodes = { 0: { text: "Ясно", icon: "☀️" }, 1: { text: "Преимущественно ясно", icon: "🌤️" }, 2: { text: "Переменная облачность", icon: "⛅" }, 3: { text: "Пасмурно", icon: "☁️" }, 45: { text: "Туман", icon: "🌫️" }, 61: { text: "Дождь", icon: "🌧️" }, 95: { text: "Гроза", icon: "⛈️" } };
    const yandexMap = { "clear": ["ясно", "☀️"], "partly-cloudy": ["малооблачно", "🌤️"], "cloudy": ["облачно с прояснениями", "⛅"], "overcast": ["пасмурно", "☁️"], "light-rain": ["небольшой дождь", "🌧️"], "rain": ["дождь", "🌧️"], "thunderstorm": ["гроза", "⛈️"] };

    async function fetchWeather() {
        const source = document.getElementById('source').value;
        document.getElementById('forecast').innerHTML = '<div class="loading">Обновление...</div>';
        try {
            if (source === 'openmeteo') await fetchOpenMeteo();
            if (source === 'yandex') await fetchYandex();
            if (source === 'accuweather') await fetchAccuWeather();
        } catch (e) { document.getElementById('weather-desc').innerText = "Ошибка API"; }
    }

    async function fetchOpenMeteo() {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${userCoords.lat}&longitude=${userCoords.lon}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=10`;
        const data = await (await fetch(url)).json();
        const current = wmoCodes[data.current.weather_code] || { text: "Ясно", icon: "☀️" };
        updateUI(Math.round(data.current.temperature_2m), capitalize(current.text), data.daily.time.map((t, i) => ({ day: new Date(t).toLocaleDateString('ru', {weekday: 'short', day: 'numeric'}), max: Math.round(data.daily.temperature_2m_max[i]), min: Math.round(data.daily.temperature_2m_min[i]), icon: (wmoCodes[data.daily.weather_code[i]] || { icon: "☀️" }).icon })));
    }

    async function fetchYandex() {
        const res = await fetch(`https://api.weather.yandex.ru/v2/forecast?lat=${userCoords.lat}&lon=${userCoords.lon}`, { headers: { 'X-Yandex-API-Key': KEYS.yandex }});
        const data = await res.json();
        const cond = yandexMap[data.fact.condition] || [data.fact.condition, "⛅"];
        updateUI(data.fact.temp, capitalize(cond[0]), data.forecasts.map(f => ({ day: new Date(f.date).toLocaleDateString('ru', {weekday: 'short', day: 'numeric'}), max: f.parts.day.temp_max, min: f.parts.night.temp_min, icon: (yandexMap[f.parts.day.condition] || ["", "⛅"])[1] })));
    }

    async function fetchAccuWeather() {
        const locRes = await fetch(`https://dataservice.accuweather.com/locations/v1/cities/geoposition/search?apikey=${KEYS.accu}&q=${userCoords.lat},${userCoords.lon}&language=ru-ru`);
        const locData = await locRes.json();
        const currentRes = await fetch(`https://dataservice.accuweather.com/currentconditions/v1/${locData.Key}?apikey=${KEYS.accu}&language=ru-ru`);
        const currentData = await currentRes.json();
        const forecastRes = await fetch(`https://dataservice.accuweather.com/forecasts/v1/daily/5day/${locData.Key}?apikey=${KEYS.accu}&metric=true&language=ru-ru`);
        const forecastData = await forecastRes.json();
        const getAccuIcon = (id) => { if (id <= 4) return "☀️"; if (id <= 6) return "🌤️"; if (id <= 11) return "☁️"; if (id <= 18) return "🌧️"; if (id <= 29) return "❄️"; return "⛅"; };
        updateUI(Math.round(currentData[0].Temperature.Metric.Value), capitalize(currentData[0].WeatherText), forecastData.DailyForecasts.map(f => ({ day: new Date(f.Date).toLocaleDateString('ru', {weekday: 'short', day: 'numeric'}), max: Math.round(f.Temperature.Maximum.Value), min: Math.round(f.Temperature.Minimum.Value), icon: getAccuIcon(f.Day.Icon) })));
    }

    function updateUI(temp, desc, forecast) {
        document.getElementById('current-temp').innerText = `${temp}°`;
        document.getElementById('weather-desc').innerText = desc;
        document.getElementById('forecast').innerHTML = forecast.map(f => `
            <div class="forecast-item">
                <div class="forecast-info"><span class="forecast-icon">${f.icon}</span><span class="forecast-date">${f.day}</span></div>
                <span><b>${f.max}°</b> / <span style="opacity:0.5">${f.min}°</span></span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
