<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Weather</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛅</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛅</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-seed: #4285f4;
            --surface: #f8f9ff;
            --on-surface: #1a1c1e;
            --primary-container: rgba(66, 133, 244, 0.15);
            --on-primary-container: #00154e;
            --secondary-container: #e1e2ec;
            --surface-variant: #e1e2ec;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --surface: #1a1c1e;
            --on-surface: #e2e2e6;
            --on-primary-container: #dce1ff;
            --secondary-container: #2f3033;
            --surface-variant: #44474f;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--surface); color: var(--on-surface);
            margin: 0; padding: 20px; transition: var(--transition);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; position: relative; }
        .header { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; padding: 0 10px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 12px; }

        #current-city { 
            font-size: clamp(0.85rem, 3.8vw, 1.1rem); font-weight: 500; margin: 0; flex: 1; 
            line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden; transition: var(--transition);
        }

        .menu-container { position: relative; flex-shrink: 0; }

        button.icon-btn {
            border: none; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; background: var(--secondary-container);
            font-size: 18px; display: flex; align-items: center;
            justify-content: center; transition: var(--transition);
            color: var(--on-surface);
        }

        /* МЕНЮ */
        .dropdown-menu {
            position: absolute; top: 50px; right: 0;
            background: var(--surface-variant); border-radius: 24px;
            padding: 8px; min-width: 220px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
            z-index: 500; display: flex; flex-direction: column;
            opacity: 0; visibility: hidden; pointer-events: none;
            transform: translateY(-10px) scale(0.95); transition: var(--transition);
        }
        .dropdown-menu.active { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0) scale(1); }

        .menu-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 16px; cursor: pointer; border-radius: 18px;
            transition: background 0.2s ease; font-weight: 500; font-size: 15px;
            color: var(--on-surface);
        }
        .menu-item:hover { background: rgba(128,128,128,0.2); }
        .menu-item .icon { font-size: 20px; width: 24px; text-align: center; }

        .palette-header { border-bottom: 1px solid rgba(128,128,128,0.1); margin-bottom: 8px; padding-bottom: 4px; }
        .colors-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 8px; }
        .color-dot { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s ease; }
        .color-dot:hover { transform: scale(1.1); }
        
        /* ИСТОЧНИК ПОГОДЫ */
        .source-picker-container { position: relative; display: inline-block; margin-bottom: 20px; }
        .source-picker-btn {
            background: var(--primary-container); border: 1px solid rgba(0,0,0,0.05);
            padding: 10px 18px; border-radius: 20px; color: var(--on-primary-container);
            font-family: inherit; font-weight: 600; cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; gap: 8px;
        }
        .source-picker-btn:after { content: '▼'; font-size: 9px; opacity: 0.7; }
        .source-menu { left: 50%; right: auto; transform: translate(-50%, -10px) scale(0.95); min-width: 180px; transform-origin: top center; }
        .source-menu.active { transform: translate(-50%, 0) scale(1); }

        /* ПОИСК */
        .search-wrapper { position: relative; width: 100%; display: none; flex-direction: column; animation: slideDown 0.2s ease; }
        .search-wrapper.active { display: flex; }
        .search-container { display: flex; width: 100%; gap: 8px; align-items: center; }
        .search-input {
            flex: 1; border: none; background: var(--secondary-container);
            color: var(--on-surface); padding: 12px 20px;
            border-radius: 24px; outline: none; font-family: inherit; transition: var(--transition);
        }
        .suggestions-list {
            position: absolute; top: 52px; left: 0; right: 0;
            background: var(--surface-variant); border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 150;
            max-height: 300px; overflow-y: auto; display: none;
        }
        .suggestions-list.active { display: block; }
        .suggestion-item { padding: 14px 20px; cursor: pointer; font-size: 14px; border-bottom: 1px solid rgba(128,128,128,0.1); color: var(--on-surface); }

        /* КАРТОЧКА ПОГОДЫ */
        .weather-card {
            background: var(--primary-container); color: var(--on-primary-container);
            padding: 40px 32px; border-radius: 32px; text-align: center;
            margin-bottom: 24px; transition: var(--transition);
        }
        .temp { font-size: 88px; font-weight: 700; margin: 5px 0; letter-spacing: -4px; transition: var(--transition); }

        /* ЛОАДЕР */
        .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; width: 100%; gap: 16px; }
        .loader {
            width: 48px; height: 48px; border: 4px solid var(--secondary-container);
            border-top: 4px solid var(--primary-seed); border-radius: 50%;
            animation: spin 0.8s linear infinite; transition: border-top-color 0.25s ease;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .forecast-item {
            background: var(--secondary-container); padding: 18px 24px;
            border-radius: 24px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px; transition: var(--transition);
        }
        .forecast-info { display: flex; align-items: center; gap: 15px; }
        .forecast-icon { font-size: 24px; }
        .forecast-date { font-weight: 500; min-width: 75px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        h3 { margin-left: 12px; font-weight: 500; transition: var(--transition); }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div class="header">
        <div class="top-bar">
            <h2 id="current-city">...</h2>
            <div class="menu-container">
                <button class="icon-btn" onclick="toggleMenu(event)">☰</button>
                <div class="dropdown-menu" id="main-menu">
                    <div class="menu-item" onclick="handleMenuAction('location')"><span class="icon">🎯</span> <span data-t="menu_location">Мое местоположение</span></div>
                    <div class="menu-item" onclick="handleMenuAction('search')"><span class="icon">📍</span> <span data-t="menu_search">Ввести адрес</span></div>
                    <div class="menu-item" onclick="handleMenuAction('palette')"><span class="icon">🎨</span> <span data-t="menu_color">Цвет</span></div>
                    <div class="menu-item" onclick="handleMenuAction('lang-menu')"><span class="icon">🌐</span> <span data-t="menu_lang">Язык</span></div>
                    <div class="menu-item" onclick="handleMenuAction('theme')"><span class="icon" id="menu-theme-icon">☀️</span> <span data-t="menu_theme">Тема</span></div>
                </div>
                <div class="dropdown-menu" id="palette">
                    <div class="palette-header"><div class="menu-item" onclick="backToMenu('palette')"><span class="icon">←</span> <span data-t="back">Назад</span></div></div>
                    <div class="colors-grid" id="colors-grid"></div>
                </div>
                <div class="dropdown-menu" id="lang-menu">
                    <div class="palette-header"><div class="menu-item" onclick="backToMenu('lang-menu')"><span class="icon">←</span> <span data-t="back">Назад</span></div></div>
                    <div class="menu-item" onclick="setLanguage('en')"><span class="icon">🇺🇸</span> English</div>
                    <div class="menu-item" onclick="setLanguage('ru')"><span class="icon">🇷🇺</span> Русский</div>
                    <div class="menu-item" onclick="setLanguage('fr')"><span class="icon">🇫🇷</span> Français</div>
                    <div class="menu-item" onclick="setLanguage('de')"><span class="icon">🇩🇪</span> Deutsch</div>
                    <div class="menu-item" onclick="setLanguage('it')"><span class="icon">🇮🇹</span> Italiano</div>
                </div>
            </div>
        </div>
        <div class="search-wrapper" id="search-wrapper">
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="..." oninput="onSearchInput(this.value)" onkeypress="handleSearch(event)">
                <button class="icon-btn" onclick="performSearch()">🔍</button>
            </div>
            <div class="suggestions-list" id="suggestions"></div>
        </div>
    </div>

    <div class="weather-card">
        <div class="source-picker-container">
            <button class="source-picker-btn" id="source-display" onclick="toggleSourceMenu(event)">Open-Meteo</button>
            <div class="dropdown-menu source-menu" id="source-menu">
                <div class="menu-item" onclick="selectSource('openmeteo', 'Open-Meteo')">Open-Meteo</div>
                <div class="menu-item" onclick="selectSource('weatherapi', 'WeatherAPI')">WeatherAPI</div>
                <div class="menu-item" onclick="selectSource('accuweather', 'AccuWeather')">AccuWeather</div>
            </div>
        </div>
        <div class="temp" id="current-temp">--°</div>
        <div id="weather-desc" style="font-weight: 500; margin-bottom: 8px; font-size: 20px;">...</div>
        <div style="font-size: 13px; opacity: 0.5" id="coords-display"></div>
    </div>

    <h3 data-t="forecast_title">Прогноз на 10 дней</h3>
    <div id="forecast"></div>
</div>

<script>
    // --- НАСТРОЙКА КЛЮЧЕЙ СЕРВИСОВ ---
    const KEYS = { 
        weatherapi: 'f8cbea75cd8b4fca894173218262105', 
        accu: 'zpka_037982925b6d47d082834529273794bf_302056d7' 
    };

    let userCoords = { lat: 0, lon: 0 };
    let searchTimer;
    let currentLang = 'ru';
    let currentSource = 'openmeteo';

    const i18n = {
        ru: {
            menu_location: "Мое местоположение", menu_search: "Ввести адрес", menu_color: "Цвет", menu_lang: "Язык", menu_theme: "Тема",
            back: "Назад", search_placeholder: "Город, район или улица...", forecast_title: "Прогноз на 10 дней", updating: "Обновление...",
            error_gps: "Разрешите доступ к GPS", error_api: "Ошибка API", error_search: "Ничего не найдено",
            wmo: { 0: "Ясно", 1: "Преимущественно ясно", 2: "Переменная облачность", 3: "Пасмурно", 45: "Туман", 61: "Дождь", 95: "Гроза" }
        },
        en: {
            menu_location: "My Location", menu_search: "Enter Address", menu_color: "Color", menu_lang: "Language", menu_theme: "Theme",
            back: "Back", search_placeholder: "City, district or street...", forecast_title: "10-Day Forecast", updating: "Updating...",
            error_gps: "Enable GPS access", error_api: "API Error", error_search: "Nothing found",
            wmo: { 0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast", 45: "Foggy", 61: "Rain", 95: "Thunderstorm" }
        },
        fr: {
            menu_location: "Ma position", menu_search: "Saisir l'adresse", menu_color: "Couleur", menu_lang: "Langue", menu_theme: "Thème",
            back: "Retour", search_placeholder: "Ville, quartier ou rue...", forecast_title: "Prévisions sur 10 jours", updating: "Mise à jour...",
            error_gps: "Activez le GPS", error_api: "Erreur API", error_search: "Rien trouvé",
            wmo: { 0: "Ciel dégagé", 1: "Plutôt dégagé", 2: "Partiellement nuageux", 3: "Couvert", 45: "Brouillard", 61: "Pluie", 95: "Orage" }
        },
        de: {
            menu_location: "Mein Standort", menu_search: "Adresse eingeben", menu_color: "Farbe", menu_lang: "Sprache", menu_theme: "Thema",
            back: "Zurück", search_placeholder: "Stadt, Viertel oder Straße...", forecast_title: "10-Tage-Vorhersage", updating: "Aktualisierung...",
            error_gps: "GPS aktivieren", error_api: "API-Fehler", error_search: "Nichts gefunden",
            wmo: { 0: "Klarer Himmel", 1: "Überwiegend klar", 2: "Teilweise bewölkt", 3: "Bedeckt", 45: "Nebel", 61: "Regen", 95: "Gewitter" }
        },
        it: {
            menu_location: "Mia posizione", menu_search: "Inserisci indirizzo", menu_color: "Colore", menu_lang: "Lingua", menu_theme: "Tema",
            back: "Indietro", search_placeholder: "Città, quartiere o via...", forecast_title: "Previsioni a 10 giorni", updating: "Aggiornamento...",
            error_gps: "Abilita il GPS", error_api: "Errore API", error_search: "Nessun risultato",
            wmo: { 0: "Cielo sereno", 1: "Prevalentemente sereno", 2: "Parzialmente nuvoloso", 3: "Coperto", 45: "Nebbia", 61: "Pioggia", 95: "Temporale" }
        }
    };

    async function refreshAddress() {
        if (userCoords.lat === 0) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userCoords.lat}&lon=${userCoords.lon}&addressdetails=1&accept-language=${currentLang}`);
            const data = await res.json();
            document.getElementById('current-city').innerText = formatAddress(data.address);
        } catch(e) {}
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('weather-lang', lang);
        applyTranslations();
        document.getElementById('lang-menu').classList.remove('active');
        refreshAddress();
        fetchWeather();
    }

    function applyTranslations() {
        const t = i18n[currentLang];
        document.querySelectorAll('[data-t]').forEach(el =>
